<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <title>MyWorkout — Interactive Prototype</title>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="styles.css"/>
  <style>
    html, body { margin: 0; height: 100%; background: #f0eee9; overflow: hidden; font-family: 'Inter', system-ui, sans-serif; }
    #root { height: 100%; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <!-- localStorage data layer — runs synchronously before any Babel scripts -->
  <script>
    var DEFAULT_SPLITS = {
      anterior: {
        id: 'anterior', name: 'Anterior', subtitle: 'Front of body', icon: 'A',
        recommended: true, color: '#6366f1',
        exercises: ['Shoulder Press','Chest Fly','Incline Chest Press','Lateral Raises','Triceps','Abs','Leg Press','Leg Extension','Adductors'],
      },
      posterior: {
        id: 'posterior', name: 'Posterior', subtitle: 'Back of body', icon: 'P',
        recommended: true, color: '#a855f7',
        exercises: ['Upper Back','Lat Pulldown','Lat Row Single','Shrugs','Rear Shoulder','Hamstrings','Calf','Hammer Curl','Hip Thrust','Preacher Curl','Wrist'],
      },
      push: {
        id: 'push', name: 'Push', subtitle: 'Chest · Shoulders · Tri', icon: '↑', color: '#06b6d4',
        exercises: ['Shoulder Press','Chest Fly','Incline Chest Press','Lateral Raises','Triceps','Abs'],
      },
      pull: {
        id: 'pull', name: 'Pull', subtitle: 'Back · Biceps', icon: '↓', color: '#10b981',
        exercises: ['Upper Back','Lat Pulldown','Lat Row Single','Shrugs','Rear Shoulder','Hammer Curl','Preacher Curl','Wrist'],
      },
      upper: {
        id: 'upper', name: 'Upper', subtitle: 'Push + Pull', icon: '⤴', color: '#f59e0b',
        exercises: ['Shoulder Press','Chest Fly','Incline Chest Press','Lateral Raises','Triceps','Upper Back','Lat Pulldown','Lat Row Single','Shrugs','Rear Shoulder','Hammer Curl','Preacher Curl','Wrist'],
      },
      lower: {
        id: 'lower', name: 'Lower', subtitle: 'Legs · Glutes', icon: '⤵', color: '#ef4444',
        exercises: ['Leg Press','Leg Extension','Adductors','Hip Thrust','Hamstrings','Calf'],
      },
    };

    var SPLIT_ORDER = ['anterior', 'posterior', 'push', 'pull', 'upper', 'lower'];

    var EXERCISE_POOL = [
      'Shoulder Press','Chest Fly','Incline Chest Press','Bench Press',
      'Lateral Raises','Front Raises','Triceps','Tricep Pushdown',
      'Overhead Tricep Ext.','Dips','Abs','Cable Crunch','Hanging Leg Raise',
      'Leg Press','Leg Extension','Adductors','Abductors',
      'Squat','Romanian Deadlift','Bulgarian Split Squat',
      'Upper Back','Lat Pulldown','Lat Row Single','Cable Row',
      'Shrugs','Rear Shoulder','Face Pull','Hamstrings','Hamstring Curl',
      'Calf','Standing Calf','Hammer Curl','Bicep Curl',
      'Preacher Curl','Concentration Curl','Hip Thrust','Glute Kickback','Wrist',
    ];

    function SK(userId, key) { return 'mw_user_' + userId + '_' + key; }

    function loadUsers() {
      try { var raw = localStorage.getItem('mw_users'); return raw ? JSON.parse(raw) : null; }
      catch(e) { return null; }
    }
    function saveUsers(users) { localStorage.setItem('mw_users', JSON.stringify(users)); }
    function loadActiveUserId() { return localStorage.getItem('mw_active_user') || null; }
    function saveActiveUserId(id) {
      if (id) localStorage.setItem('mw_active_user', id);
      else localStorage.removeItem('mw_active_user');
    }
    function loadUserData(userId) {
      try {
        var splitsRaw = localStorage.getItem(SK(userId, 'splits'));
        var histRaw = localStorage.getItem(SK(userId, 'history'));
        return { splits: splitsRaw ? JSON.parse(splitsRaw) : null, history: histRaw ? JSON.parse(histRaw) : [] };
      } catch(e) { return { splits: null, history: [] }; }
    }
    function saveUserSplits(userId, splits) { localStorage.setItem(SK(userId, 'splits'), JSON.stringify(splits)); }
    function saveUserHistory(userId, history) { localStorage.setItem(SK(userId, 'history'), JSON.stringify(history)); }

    function todayStr() {
      var d = new Date();
      return d.toLocaleDateString('en-GB', { weekday: 'short', day: 'numeric', month: 'short', year: 'numeric' });
    }
    function makeId() { return Date.now() + Math.floor(Math.random() * 1000); }
    function defaultUserSplits() {
      var out = {};
      SPLIT_ORDER.forEach(function(id, i) {
        var s = JSON.parse(JSON.stringify(DEFAULT_SPLITS[id]));
        s.added = i < 2;
        out[id] = s;
      });
      return out;
    }
    function seedDemoSession(userId, splitId, exercises, daysAgo) {
      var d = new Date();
      d.setDate(d.getDate() - daysAgo);
      var dateStr = d.toLocaleDateString('en-GB', { weekday: 'short', day: 'numeric', month: 'short', year: 'numeric' });
      return { id: d.getTime(), date: dateStr, day: splitId, exercises: exercises };
    }

    Object.assign(window, {
      DEFAULT_SPLITS, SPLIT_ORDER, EXERCISE_POOL,
      loadUsers, saveUsers, loadActiveUserId, saveActiveUserId,
      loadUserData, saveUserSplits, saveUserHistory,
      todayStr, makeId, defaultUserSplits, seedDemoSession,
    });
  </script>

  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="ios-frame.jsx"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="icons.jsx"></script>
  <script type="text/babel" src="screens.jsx"></script>
  <script type="text/babel" src="screens-2.jsx"></script>

  <script type="text/babel">
    const { useState: useS, useEffect: useE, useMemo: useM } = React;

    // ── helpers ──
    function colorFromName(name) {
      const palette = ['#6366f1','#a855f7','#06b6d4','#10b981','#f59e0b','#ef4444','#ec4899','#8b5cf6'];
      let h = 0; for (let i = 0; i < name.length; i++) h = (h * 31 + name.charCodeAt(i)) | 0;
      return palette[Math.abs(h) % palette.length];
    }
    function initialsOf(name) {
      const parts = (name || '').trim().split(/\s+/).filter(Boolean);
      if (!parts.length) return '?';
      if (parts.length === 1) return parts[0].slice(0, 2).toUpperCase();
      return (parts[0][0] + parts[parts.length - 1][0]).toUpperCase();
    }

    // ── multi-user localStorage login screen ──
    function LoginScreen({ users, onLogin, onCreate }) {
      const [name, setName] = useS('');
      const [creating, setCreating] = useS(users.length === 0);

      const submit = () => {
        if (!name.trim()) return;
        onCreate(name.trim());
        setName('');
        setCreating(false);
      };

      return (
        <div style={{ height: '100%', display: 'flex', flexDirection: 'column', padding: '32px 24px', justifyContent: 'center' }} className="mw-fade-in">
          <div style={{ marginBottom: 36, textAlign: 'center' }}>
            <div style={{ display: 'inline-flex', width: 56, height: 56, borderRadius: 16, background: 'var(--grad)', alignItems: 'center', justifyContent: 'center', marginBottom: 16, boxShadow: '0 8px 24px rgba(99,102,241,.4)' }}>
              <Icon name="dumbbell" size={28} color="white"/>
            </div>
            <div className="mw-eyebrow" style={{ marginBottom: 6 }}>MyWorkout</div>
            <h1 className="mw-h1 mw-grad-text" style={{ fontSize: 36 }}>Welcome back</h1>
            <p className="mw-mute" style={{ marginTop: 8, fontSize: 14 }}>Pick a profile to continue your training.</p>
          </div>

          {!creating && users.length > 0 && (
            <div style={{ display: 'flex', flexDirection: 'column', gap: 10, marginBottom: 16 }}>
              {users.map(u => (
                <button key={u.id} className="mw-card" onClick={() => onLogin(u.id)}
                  style={{ display: 'flex', alignItems: 'center', gap: 14, textAlign: 'left', padding: 14, borderColor: 'var(--border)', cursor: 'pointer' }}>
                  <div className="mw-avatar-sm" style={{ width: 48, height: 48, fontSize: 18, background: u.color || 'var(--grad)' }}>{u.initials}</div>
                  <div style={{ flex: 1 }}>
                    <div style={{ fontWeight: 600, fontSize: 15 }}>{u.name}</div>
                    <div className="mw-mute" style={{ fontSize: 12 }}>{u.sessionCount || 0} sessions logged</div>
                  </div>
                  <Icon name="chevron-right" size={18} color="var(--text-mute)"/>
                </button>
              ))}
            </div>
          )}

          {creating ? (
            <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
              <div>
                <div className="mw-eyebrow" style={{ marginBottom: 8 }}>Your name</div>
                <input className="mw-input" autoFocus placeholder="e.g. 511" value={name}
                  onChange={e => setName(e.target.value)}
                  onKeyDown={e => e.key === 'Enter' && submit()}/>
              </div>
              <button className="mw-btn mw-btn-primary" onClick={submit} disabled={!name.trim()}
                style={{ opacity: name.trim() ? 1 : 0.5 }}>
                <Icon name="sparkle" size={16} color="white"/> Create profile
              </button>
              {users.length > 0 && (
                <button className="mw-btn mw-btn-ghost" onClick={() => setCreating(false)}>Back</button>
              )}
            </div>
          ) : (
            <button className="mw-btn mw-btn-ghost" onClick={() => setCreating(true)}>
              <Icon name="plus" size={16}/> Add new profile
            </button>
          )}

          <div style={{ marginTop: 28, textAlign: 'center', fontSize: 11, color: 'var(--text-mute)', fontFamily: 'var(--mono)' }}>
            Each profile keeps its own splits & history.
          </div>
        </div>
      );
    }
    window.LoginScreen = LoginScreen;

    // ── localStorage app state ──
    function useAppState(seedUserName) {
      const [users, setUsers] = useS(() => loadUsers() || []);
      const [activeId, setActiveId] = useS(() => loadActiveUserId());
      const [splits, setSplits] = useS({});
      const [history, setHistory] = useS([]);

      useE(() => {
        if (!activeId) return;
        const data = loadUserData(activeId);
        setSplits(data.splits || defaultUserSplits());
        setHistory(data.history || []);
      }, [activeId]);

      useE(() => {
        if (users.length === 0 && seedUserName) createUser(seedUserName);
        // eslint-disable-next-line
      }, []);

      const persistUsers = (next) => { setUsers(next); saveUsers(next); };

      const createUser = (name) => {
        const id = 'u_' + Date.now();
        const u = { id, name, initials: initialsOf(name), color: colorFromName(name), sessionCount: 0 };
        const next = [...users, u]; persistUsers(next);
        saveUserSplits(id, defaultUserSplits());
        saveUserHistory(id, []);
        setActiveId(id); saveActiveUserId(id);
        return u;
      };

      const login = (id) => { setActiveId(id); saveActiveUserId(id); };
      const logout = () => { setActiveId(null); saveActiveUserId(null); };

      const updateSplits = (next) => {
        setSplits(next);
        if (activeId) saveUserSplits(activeId, next);
      };

      const saveSession = (splitId, exercises) => {
        if (!activeId) return;
        const dateStr = todayStr();
        const existing = history.find(h => h.date === dateStr && h.day === splitId);
        let next;
        if (existing) {
          const exMap = new Map(existing.exercises.map(e => [e.name, e]));
          exercises.forEach(e => exMap.set(e.name, e));
          const merged = { ...existing, exercises: [...exMap.values()] };
          next = history.map(h => h.id === existing.id ? merged : h);
        } else {
          next = [{ id: makeId(), date: dateStr, day: splitId, exercises }, ...history];
        }
        setHistory(next);
        saveUserHistory(activeId, next);
        const newUsers = users.map(u => u.id === activeId ? { ...u, sessionCount: next.length } : u);
        persistUsers(newUsers);
      };

      const deleteSession = (id) => {
        const next = history.filter(h => h.id !== id);
        setHistory(next);
        if (activeId) saveUserHistory(activeId, next);
      };

      const toggleSplit = (id, added) => {
        updateSplits({ ...splits, [id]: { ...splits[id], added } });
      };

      const activeUser = users.find(u => u.id === activeId) || null;
      return { users, activeUser, splits, history, createUser, login, logout, updateSplits, saveSession, deleteSession, toggleSplit };
    }

    // ── Mobile shell ──
    function MobileApp({ initialName, theme, density }) {
      const app = useAppState(initialName);
      const [route, setRoute] = useS({ name: 'dashboard' });

      useE(() => {
        if (!app.activeUser) setRoute({ name: 'login' });
        else if (route.name === 'login') setRoute({ name: 'dashboard' });
      }, [app.activeUser]);

      if (!app.activeUser) {
        return (
          <div className="mw-root" data-theme={theme} data-density={density} style={{ height: '100%' }}>
            <LoginScreen users={app.users} onLogin={app.login} onCreate={app.createUser}/>
          </div>
        );
      }

      let body;
      if (route.name === 'dashboard') {
        body = <Dashboard user={app.activeUser} splits={app.splits} history={app.history}
          onPickSplit={(id) => setRoute({ name: 'logger', splitId: id })}
          onEditSplits={() => setRoute({ name: 'edit' })}
          onLogout={app.logout}
          onToggleSplit={app.toggleSplit}
          onGo={(n) => setRoute({ name: n })}/>;
      } else if (route.name === 'logger') {
        const split = app.splits[route.splitId];
        body = <Logger split={split} history={app.history}
          onBack={() => setRoute({ name: 'dashboard' })}
          onSave={(exs) => { app.saveSession(route.splitId, exs); }}
          onEditSplit={() => setRoute({ name: 'edit' })}/>;
      } else if (route.name === 'edit') {
        body = <EditSplits splits={app.splits} onSave={app.updateSplits} onBack={() => setRoute({ name: 'dashboard' })}/>;
      } else if (route.name === 'history') {
        body = <History history={app.history} splits={app.splits} onBack={() => setRoute({ name: 'dashboard' })} onDelete={app.deleteSession}/>;
      } else if (route.name === 'progress') {
        body = <Progress history={app.history} splits={app.splits} onBack={() => setRoute({ name: 'dashboard' })}/>;
      }

      const showTabs = ['dashboard', 'history', 'progress'].includes(route.name);

      return (
        <div className="mw-root" data-theme={theme} data-density={density} style={{ height: '100%', display: 'flex', flexDirection: 'column', position: 'relative' }}>
          <div style={{ flex: 1, position: 'relative', overflow: 'hidden' }}>{body}</div>
          {showTabs && (
            <div className="mw-tabbar">
              <button className={`mw-tab ${route.name === 'dashboard' ? 'active' : ''}`} onClick={() => setRoute({ name: 'dashboard' })}>
                <Icon name="home" size={18}/>HOME
              </button>
              <button className={`mw-tab ${route.name === 'history' ? 'active' : ''}`} onClick={() => setRoute({ name: 'history' })}>
                <Icon name="history" size={18}/>HISTORY
              </button>
              <button className={`mw-tab ${route.name === 'progress' ? 'active' : ''}`} onClick={() => setRoute({ name: 'progress' })}>
                <Icon name="chart" size={18}/>PROGRESS
              </button>
            </div>
          )}
        </div>
      );
    }

    // ── Desktop shell ──
    function DesktopApp({ initialName, theme, density }) {
      const app = useAppState(initialName);
      const [route, setRoute] = useS({ name: 'dashboard' });

      useE(() => {
        if (!app.activeUser) setRoute({ name: 'login' });
        else if (route.name === 'login') setRoute({ name: 'dashboard' });
      }, [app.activeUser]);

      if (!app.activeUser) {
        return (
          <div className="mw-root" data-theme={theme} data-density={density} style={{ height: '100%', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
            <div style={{ width: 420, background: 'var(--surface)', border: '1px solid var(--border)', borderRadius: 24, overflow: 'hidden' }}>
              <LoginScreen users={app.users} onLogin={app.login} onCreate={app.createUser}/>
            </div>
          </div>
        );
      }

      const navItems = [
        { id: 'dashboard', label: 'Dashboard', icon: 'home' },
        { id: 'history', label: 'History', icon: 'history' },
        { id: 'progress', label: 'Progress', icon: 'chart' },
        { id: 'edit', label: 'Edit splits', icon: 'edit' },
      ];

      const splitsList = SPLIT_ORDER.map(id => app.splits[id]).filter(Boolean);
      Object.values(app.splits).forEach(s => { if (!SPLIT_ORDER.includes(s.id)) splitsList.push(s); });

      return (
        <div className="mw-root" data-theme={theme} data-density={density} style={{ height: '100%' }}>
          <div className="mw-desktop-shell">
            <aside className="mw-side">
              <div style={{ display: 'flex', alignItems: 'center', gap: 10, padding: '4px 8px 16px', borderBottom: '1px solid var(--border)', marginBottom: 12 }}>
                <div style={{ width: 30, height: 30, borderRadius: 9, background: 'var(--grad)', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                  <Icon name="dumbbell" size={16} color="white"/>
                </div>
                <div style={{ fontWeight: 700, fontSize: 14 }} className="mw-grad-text">MyWorkout</div>
              </div>

              <div style={{ display: 'flex', alignItems: 'center', gap: 10, padding: '6px 8px', marginBottom: 14, background: 'var(--surface-2)', borderRadius: 10 }}>
                <div className="mw-avatar-sm" style={{ width: 28, height: 28, fontSize: 11, background: app.activeUser.color }}>{app.activeUser.initials}</div>
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{ fontSize: 12, fontWeight: 600, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{app.activeUser.name}</div>
                  <div className="mw-mute" style={{ fontSize: 10 }}>{app.history.length} sessions</div>
                </div>
                <button className="mw-btn mw-btn-icon" onClick={app.logout} style={{ width: 26, height: 26 }}>
                  <Icon name="logout" size={11} color="var(--text-mute)"/>
                </button>
              </div>

              {navItems.map(n => (
                <div key={n.id} className={`mw-side-item ${route.name === n.id ? 'active' : ''}`} onClick={() => setRoute({ name: n.id })}>
                  <Icon name={n.icon} size={15}/> {n.label}
                </div>
              ))}

              <div style={{ marginTop: 'auto', padding: '12px 8px 4px', borderTop: '1px solid var(--border)' }}>
                <div className="mw-eyebrow" style={{ marginBottom: 8 }}>Quick start</div>
                <div style={{ display: 'flex', flexDirection: 'column', gap: 4 }}>
                  {splitsList.slice(0, 6).map(s => (
                    <button key={s.id} className="mw-side-item" style={{ padding: '6px 10px' }}
                      onClick={() => setRoute({ name: 'logger', splitId: s.id })}>
                      <span style={{ width: 18, height: 18, borderRadius: 5, background: (s.color || '#6366f1') + '22', color: s.color || 'var(--accent)', display: 'inline-flex', alignItems: 'center', justifyContent: 'center', fontSize: 10, fontWeight: 700, fontFamily: 'var(--mono)' }}>{s.icon || s.name[0]}</span>
                      <span style={{ fontSize: 12 }}>{s.name}</span>
                    </button>
                  ))}
                </div>
              </div>
            </aside>

            <main style={{ position: 'relative', overflow: 'hidden', display: 'flex', flexDirection: 'column' }}>
              {route.name === 'dashboard' && (
                <DesktopDashboard user={app.activeUser} splits={app.splits} history={app.history}
                  onPickSplit={(id) => setRoute({ name: 'logger', splitId: id })}
                  onEditSplits={() => setRoute({ name: 'edit' })}
                  onToggleSplit={app.toggleSplit}
                  onGo={(n) => setRoute({ name: n })}/>
              )}
              {route.name === 'logger' && (
                <Logger split={app.splits[route.splitId]} history={app.history}
                  onBack={() => setRoute({ name: 'dashboard' })}
                  onSave={(exs) => app.saveSession(route.splitId, exs)}
                  onEditSplit={() => setRoute({ name: 'edit' })}/>
              )}
              {route.name === 'edit' && (
                <EditSplits splits={app.splits} onSave={app.updateSplits} onBack={() => setRoute({ name: 'dashboard' })}/>
              )}
              {route.name === 'history' && (
                <History history={app.history} splits={app.splits} onBack={() => setRoute({ name: 'dashboard' })} onDelete={app.deleteSession}/>
              )}
              {route.name === 'progress' && (
                <Progress history={app.history} splits={app.splits} onBack={() => setRoute({ name: 'dashboard' })}/>
              )}
            </main>
          </div>
        </div>
      );
    }

    function DesktopDashboard({ user, splits, history, onPickSplit, onEditSplits, onGo, onToggleSplit }) {
      const allList = SPLIT_ORDER.map(id => splits[id]).filter(Boolean);
      Object.values(splits).forEach(s => { if (!SPLIT_ORDER.includes(s.id)) allList.push(s); });
      const splitsList = allList.filter(s => s.added !== false);
      const availableList = allList.filter(s => s.added === false);
      const [showPicker, setShowPicker] = useS(false);
      const todaySessions = history.filter(h => h.date === todayStr());

      return (
        <div className="mw-scroll mw-fade-in" style={{ flex: 1, padding: '32px 40px', overflowY: 'auto' }}>
          <div style={{ display: 'flex', alignItems: 'flex-end', justifyContent: 'space-between', gap: 16, marginBottom: 32 }}>
            <div style={{ flex: 1, minWidth: 0 }}>
              <div className="mw-eyebrow" style={{ marginBottom: 6 }}>{todayStr()}</div>
              <h1 className="mw-h1" style={{ fontSize: 30, lineHeight: 1.25, paddingBottom: 6, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>Hey <span className="mw-grad-text" style={{ paddingRight: 2 }}>{user.name}</span> — let's lift.</h1>
            </div>
            <button className="mw-btn mw-btn-primary" onClick={() => onGo('progress')} style={{ flexShrink: 0 }}>
              <Icon name="chart" size={14} color="white"/> View progress
            </button>
          </div>

          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 12, marginBottom: 28 }}>
            <div className="mw-stat">
              <div className="mw-stat-num mw-grad-text">{history.length}</div>
              <div className="mw-stat-lbl">Total Sessions</div>
            </div>
            <div className="mw-stat">
              <div className="mw-stat-num">{streakOf(history)}</div>
              <div className="mw-stat-lbl">Current Streak</div>
            </div>
            <div className="mw-stat">
              <div className="mw-stat-num">{todaySessions.length}</div>
              <div className="mw-stat-lbl">Today</div>
            </div>
            <div className="mw-stat">
              <div className="mw-stat-num">{splitsList.length}</div>
              <div className="mw-stat-lbl">Active Splits</div>
            </div>
          </div>

          <div style={{ display: 'flex', alignItems: 'baseline', justifyContent: 'space-between', marginBottom: 12 }}>
            <h2 className="mw-h2">{splitsList.length === 6 ? 'Recommended 6-day rotation' : 'Your splits'}</h2>
            <div style={{ display: 'flex', gap: 6 }}>
              <button className="mw-btn mw-btn-sm" onClick={() => setShowPicker(true)}>
                <Icon name="plus" size={12}/> Add split
              </button>
              <button className="mw-btn mw-btn-sm mw-btn-ghost" onClick={onEditSplits}>
                <Icon name="edit" size={12}/> Edit splits
              </button>
            </div>
          </div>
          <div className="mw-eyebrow" style={{ marginBottom: 10 }}>{splitsList.length} active · {availableList.length} more available</div>

          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 12 }}>
            {splitsList.map((s) => (
              <SplitCard key={s.id} split={s} sessions={history.filter(h => h.day === s.id).length}
                todayDone={todaySessions.some(t => t.day === s.id)}
                onClick={() => onPickSplit(s.id)} />
            ))}
            {splitsList.length === 0 && (
              <div className="mw-mute" style={{ gridColumn: '1 / -1', textAlign: 'center', padding: 40, fontSize: 13, border: '1px dashed var(--border)', borderRadius: 12 }}>
                No splits yet — click <strong>Add split</strong> to get started.
              </div>
            )}
          </div>

          {showPicker && (
            <SplitPicker available={availableList} all={allList}
              onAdd={(id) => onToggleSplit(id, true)}
              onRemove={(id) => onToggleSplit(id, false)}
              onClose={() => setShowPicker(false)}
              onCreateCustom={() => { setShowPicker(false); onEditSplits(); }}/>
          )}
        </div>
      );
    }

    window.MobileApp = MobileApp;
    window.DesktopApp = DesktopApp;

    // ── Design canvas root ──
    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "theme": "slate",
      "density": "comfy",
      "view": "both",
      "seedName": "511"
    }/*EDITMODE-END*/;

    function Root() {
      const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);
      const themeMap = { midnight: 'midnight', slate: 'slate', ember: 'ember', light: 'light' };
      const theme = themeMap[tweaks.theme] || 'midnight';

      return (
        <>
          <DesignCanvas>
            <DCSection id="prototype" title="MyWorkout" subtitle="Multi-user workout tracker · 6-split rotation · mobile + desktop">

              {(tweaks.view === 'both' || tweaks.view === 'mobile') && (
                <DCArtboard id="mobile-app" label="Mobile · Full Prototype" width={402} height={874}>
                  <IOSDevice width={402} height={874} dark>
                    <div style={{ height: '100%', background: 'var(--bg, #0a0a0c)', paddingTop: 54, paddingBottom: 24, boxSizing: 'border-box' }}>
                      <MobileApp initialName={tweaks.seedName} theme={theme} density={tweaks.density}/>
                    </div>
                  </IOSDevice>
                </DCArtboard>
              )}

              {(tweaks.view === 'both' || tweaks.view === 'desktop') && (
                <DCArtboard id="desktop-app" label="Desktop · Full Prototype" width={1280} height={820}>
                  <div style={{ height: '100%', background: 'var(--bg, #0a0a0c)', borderRadius: 12, overflow: 'hidden' }}>
                    <DesktopApp initialName={tweaks.seedName} theme={theme} density={tweaks.density}/>
                  </div>
                </DCArtboard>
              )}

            </DCSection>
          </DesignCanvas>

          <TweaksPanel title="Tweaks">
            <TweakSection title="Theme">
              <TweakRadio label="Visual style" value={tweaks.theme} onChange={v => setTweak('theme', v)}
                options={[{value:'midnight', label:'Midnight'},{value:'slate', label:'Slate'},{value:'ember', label:'Ember'},{value:'light', label:'Light'}]}/>
              <TweakRadio label="Density" value={tweaks.density} onChange={v => setTweak('density', v)}
                options={[{value:'comfy', label:'Comfy'},{value:'compact', label:'Compact'}]}/>
            </TweakSection>
            <TweakSection title="Layout">
              <TweakRadio label="Show" value={tweaks.view} onChange={v => setTweak('view', v)}
                options={[{value:'both', label:'Both'},{value:'mobile', label:'Mobile'},{value:'desktop', label:'Desktop'}]}/>
            </TweakSection>
            <TweakSection title="Demo">
              <TweakText label="Seed user name" value={tweaks.seedName} onChange={v => setTweak('seedName', v)}/>
              <TweakButton label="Reset all data" onClick={() => {
                if (confirm('Wipe all users, splits and history?')) {
                  Object.keys(localStorage).filter(k => k.startsWith('mw_')).forEach(k => localStorage.removeItem(k));
                  location.reload();
                }
              }}/>
            </TweakSection>
          </TweaksPanel>
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<Root/>);
  </script>
</body>
</html>
