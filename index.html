<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <title>MyWorkout — Interactive Prototype</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="styles.css"/>
  <style>
    html, body { margin: 0; height: 100%; background: #0a0a0c; overflow: hidden; font-family: 'Inter', system-ui, sans-serif; }
    #root { height: 100%; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="ios-frame.jsx"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="icons.jsx"></script>
  <script type="text/babel" src="data.jsx"></script>
  <script type="text/babel" src="screens.jsx"></script>
  <script type="text/babel" src="screens-2.jsx"></script>
  <script type="text/babel" src="screens-social.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>

  <script type="text/babel">
    const { useState: useS, useEffect: useE } = React;

    function Root() {
      const [isMobile, setIsMobile] = useS(() => window.matchMedia('(max-width: 767px)').matches);
      const [theme, setTheme] = useS(() => localStorage.getItem('mw-theme') || 'slate');
      const [lang, setLang] = useS(() => localStorage.getItem('mw-lang') || 'en');

      const toggleTheme = () => {
        setTheme(t => {
          const next = t === 'light' ? 'slate' : 'light';
          localStorage.setItem('mw-theme', next);
          return next;
        });
      };

      const toggleLang = () => {
        setLang(l => {
          const next = l === 'en' ? 'ar' : 'en';
          localStorage.setItem('mw-lang', next);
          return next;
        });
      };

      useE(() => {
        const { data: { subscription } } = sb.auth.onAuthStateChange((event) => {
          if (event === 'SIGNED_OUT') {
            setLang('en');
            localStorage.setItem('mw-lang', 'en');
          }
        });
        return () => subscription.unsubscribe();
      }, []);

      useE(() => {
        document.body.style.background = theme === 'light' ? '#f7f6f3' : '#0a0a0c';
      }, [theme]);

      useE(() => {
        const mq = window.matchMedia('(max-width: 767px)');
        const handler = (e) => setIsMobile(e.matches);
        mq.addEventListener('change', handler);
        return () => mq.removeEventListener('change', handler);
      }, []);

      if (isMobile) {
        return (
          <div style={{ height: '100%' }}>
            <MobileApp theme={theme} density="comfy" onToggleTheme={toggleTheme} lang={lang} onToggleLang={toggleLang}/>
          </div>
        );
      }

      return (
        <div style={{ height: '100%' }}>
          <DesktopApp theme={theme} density="comfy" onToggleTheme={toggleTheme} lang={lang} onToggleLang={toggleLang}/>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<Root/>);
  </script>
</body>
</html>
